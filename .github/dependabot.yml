version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 3
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    versioning-strategy: increase
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - "astro"
          - "astro-*"
          - "@astrojs/*"
      eslint:
        patterns:
          - "@eslint/*"
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
      postcss:
        patterns:
          - "postcss*"
          - "cssnano"
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
